<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — Student Portal</title>
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
:root{--stu:#7C3AED;--stu-light:#EDE9FE;--stu-pale:#F5F3FF;--stu-dark:#5B21B6;}
.sidebar{background:linear-gradient(180deg,#1E0A3C 0%,#2D1B69 100%);}
.sb-link.active{background:rgba(124,58,237,.28);color:#C4B5FD;}
.sb-link.active .sb-icon{background:rgba(124,58,237,.35);color:#A78BFA;}
.sb-link:hover{background:rgba(255,255,255,.07);}
.sb-section-label{color:rgba(255,255,255,.35);}
.live-dot{background:var(--stu);}

.msg-layout{display:grid;grid-template-columns:300px 1fr;gap:0;background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;height:calc(100vh - 180px);min-height:500px;}
.thread-list{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.thread-search{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.thread-item{display:flex;gap:10px;padding:12px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);}
.thread-item:hover{background:var(--bg);}
.thread-item.active{background:var(--stu-pale);border-left:3px solid var(--stu);}
.thread-item.unread .ti-name{color:var(--ink);font-weight:800;}
.thread-item.unread .ti-preview{color:var(--ink-2);}
.ti-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:800;color:#fff;flex-shrink:0;}
.ti-name{font-size:.84rem;font-weight:700;color:var(--ink-2);}
.ti-role{font-size:.68rem;color:var(--muted);}
.ti-preview{font-size:.76rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.ti-time{font-size:.66rem;color:var(--muted);flex-shrink:0;text-align:right;}
.ti-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--stu);flex-shrink:0;margin-top:4px;}

.chat-area{display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--white);}
.chat-name{font-size:.92rem;font-weight:800;color:var(--ink);}
.chat-role{font-size:.73rem;color:var(--muted);}
.chat-messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;background:var(--bg);}
.msg-bubble{max-width:65%;display:flex;flex-direction:column;gap:3px;}
.msg-bubble.from-them{align-self:flex-start;}
.msg-bubble.from-me{align-self:flex-end;}
.mb-text{padding:10px 14px;border-radius:14px;font-size:.84rem;line-height:1.5;}
.from-them .mb-text{background:var(--white);border:1px solid var(--border);color:var(--ink-2);border-radius:4px 14px 14px 14px;}
.from-me .mb-text{background:var(--stu);color:#fff;border-radius:14px 4px 14px 14px;}
.mb-time{font-size:.66rem;color:var(--muted);padding:0 4px;}
.from-me .mb-time{text-align:right;}
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;background:var(--white);}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:24px;font-size:.84rem;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.chat-input:focus{border-color:var(--stu);}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--stu);color:#fff;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.send-btn:hover{background:var(--stu-dark);transform:scale(1.07);}

.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:8px;}

.toast-stack{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1F2937;color:#fff;padding:10px 16px;border-radius:9px;font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:toast-in .25s ease both;transition:opacity .3s;}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar"></aside>

<main class="main">
  <div class="topbar"></div>

  <div class="page-body">
    <div class="page-header" style="margin-bottom:16px;">
      <div>
        <div class="page-eyebrow">💬 Communication</div>
        <div class="page-title">Messages</div>
        <div class="page-sub">Direct messages from your teachers and class coordinator.</div>
      </div>
    </div>

    <div class="msg-layout anim-1">
      <!-- Thread list -->
      <div class="thread-list">
        <div class="thread-search">
          <input type="text" class="form-input" placeholder="🔍 Search messages…" style="width:100%;font-size:.82rem;">
        </div>
        <div style="flex:1;overflow-y:auto;" id="threadList"></div>
      </div>

      <!-- Chat area -->
      <div class="chat-area" id="chatArea">
        <div class="chat-empty"><div style="font-size:2.5rem;">💬</div><div style="font-size:.9rem;font-weight:700;">Select a conversation</div><div style="font-size:.78rem;">to read and reply</div></div>
      </div>
    </div>
  </div>
</main>
</div>
<div class="toast-stack" id="toastStack"></div>
<script>
const threads = [
  { id:1, name:'Dr. Karim Hossain', role:'Mathematics Teacher', avatar:'KH', color:'#1D4ED8', unread:2, time:'10:32 AM',
    messages:[
      {from:'them', text:'Farhan, please review Chapter 8 before tomorrow\'s class. There will be a short quiz on coordinate geometry.', time:'10:20 AM'},
      {from:'me', text:'Understood, sir. I\'ll go through the exercises tonight.', time:'10:25 AM'},
      {from:'them', text:'Good. Also, your assignment for Chapter 7 scored 48/50. Excellent work!', time:'10:31 AM'},
      {from:'them', text:'Keep it up. See you tomorrow.', time:'10:32 AM'},
    ]},
  { id:2, name:'Ms. Nasrin Begum', role:'Physics Teacher', avatar:'NB', color:'#059669', unread:1, time:'Yesterday',
    messages:[
      {from:'them', text:'Hi Farhan, the Half-Yearly Physics paper has been uploaded to Study Resources. Please download it for practice.', time:'Yesterday 3:14 PM'},
      {from:'me', text:'Thank you, ma\'am! I\'ll download it right away.', time:'Yesterday 3:20 PM'},
      {from:'them', text:'Your last lab report was very well written. Well done!', time:'Yesterday 4:05 PM'},
    ]},
  { id:3, name:'Mr. Shahed Alam', role:'Chemistry Teacher', avatar:'SA', color:'#D97706', unread:0, time:'Feb 23',
    messages:[
      {from:'them', text:'Farhan, please bring your practical notebook on Friday. We will be doing the chapter 6 experiment.', time:'Feb 23 11:00 AM'},
      {from:'me', text:'Noted, sir. I have completed the pre-lab write-up as well.', time:'Feb 23 11:15 AM'},
    ]},
  { id:4, name:'Ms. Roksana Parvin', role:'English Teacher', avatar:'RP', color:'#be123c', unread:1, time:'Feb 22',
    messages:[
      {from:'them', text:'Your essay on "Technology in Education" was exceptional. I have submitted it for the inter-school essay competition.', time:'Feb 22 2:30 PM'},
      {from:'me', text:'That\'s wonderful, ma\'am! Thank you so much!', time:'Feb 22 2:45 PM'},
      {from:'them', text:'The competition is on March 5. Please prepare a short spoken version as well.', time:'Feb 22 2:46 PM'},
    ]},
  { id:5, name:'Class Coordinator', role:'Academic Coordinator', avatar:'CC', color:'#6D28D9', unread:0, time:'Feb 20',
    messages:[
      {from:'them', text:'Dear Farhan, your attendance for January was 96%. Please maintain this in February. Well done!', time:'Feb 20 9:00 AM'},
    ]},
];

let activeThread = null;

function renderThreads() {
  document.getElementById('threadList').innerHTML = threads.map(t => `
    <div class="thread-item ${t.unread > 0 ? 'unread' : ''} ${activeThread === t.id ? 'active' : ''}" onclick="openThread(${t.id})">
      <div class="ti-avatar" style="background:${t.color};">${t.avatar}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
          <div class="ti-name">${t.name}</div>
          <div class="ti-time">${t.time}</div>
        </div>
        <div class="ti-role">${t.role}</div>
        <div class="ti-preview">${t.messages[t.messages.length-1].text}</div>
      </div>
      ${t.unread > 0 ? `<div class="ti-unread-dot"></div>` : ''}
    </div>`).join('');
}

function openThread(id) {
  activeThread = id;
  const t = threads.find(x => x.id === id);
  t.unread = 0;
  renderThreads();

  document.getElementById('chatArea').innerHTML = `
    <div class="chat-header">
      <div class="ti-avatar" style="background:${t.color};width:38px;height:38px;">${t.avatar}</div>
      <div><div class="chat-name">${t.name}</div><div class="chat-role">${t.role} · Dhaka High School</div></div>
    </div>
    <div class="chat-messages" id="chatMessages">
      ${t.messages.map(m => `
        <div class="msg-bubble from-${m.from === 'me' ? 'me' : 'them'}">
          <div class="mb-text">${m.text}</div>
          <div class="mb-time">${m.time}</div>
        </div>`).join('')}
    </div>
    <div class="chat-input-bar">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg(${id})">
      <button class="send-btn" onclick="sendMsg(${id})">➤</button>
    </div>`;
  const msgs = document.getElementById('chatMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg(id) {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  const t = threads.find(x => x.id === id);
  const now = new Date(); const timeStr = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  t.messages.push({from:'me', text, time: timeStr});
  inp.value = '';
  openThread(id);
  showToast('Message sent','✉');
}

function showToast(msg, icon='✅') {
  const s = document.getElementById('toastStack');
  const t = document.createElement('div'); t.className = 'toast';
  t.innerHTML = `<span>${icon}</span>${msg}`;
  s.appendChild(t); setTimeout(()=>t.style.opacity='0',2400); setTimeout(()=>t.remove(),2700);
}

renderThreads();
openThread(1);
</script>
<script src="../demo-nav.js"></script>
<script src="student-shell.js"></script>
</body>
