<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Tracking &middot; EduOS Marketplace</title>
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
:root{--mkt:#059669;--mkt-light:#D1FAE5;--mkt-pale:#ECFDF5;--mkt-dark:#065F46;}
.sidebar{background:linear-gradient(180deg,#022C22 0%,#064E3B 100%);}
.sb-link.active{background:rgba(5,150,105,.28);color:#6EE7B7;}
.sb-link.active .sb-icon{background:rgba(5,150,105,.35);color:#34D399;}
.sb-link:hover{background:rgba(255,255,255,.07);}
.sb-section-label{color:rgba(255,255,255,.35);}
.live-dot{background:var(--mkt);}

/* Order selector tabs */
.order-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:22px;}
.ot-card{border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .15s;flex-shrink:0;min-width:180px;background:var(--white);}
.ot-card:hover,.ot-card.on{border-color:var(--mkt);background:var(--mkt-pale);}
.ot-id{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:800;color:var(--ink);}
.ot-date{font-size:.7rem;color:var(--muted);margin-top:2px;}
.ot-status{font-size:.72rem;font-weight:800;padding:3px 8px;border-radius:8px;margin-top:6px;display:inline-block;}

/* Progress tracker &middot; horizontal stepper */
.progress-track{display:flex;align-items:flex-start;gap:0;padding:24px 28px;position:relative;}
.pt-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.pt-step::before{content:'';position:absolute;top:17px;left:50%;right:-50%;height:3px;background:var(--border);z-index:0;}
.pt-step:last-child::before{display:none;}
.pt-step.done::before{background:var(--mkt);}
.pt-icon-wrap{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:.9rem;z-index:1;position:relative;transition:all .2s;}
.pt-step.done .pt-icon-wrap{border-color:var(--mkt);background:var(--mkt);color:#fff;}
.pt-step.active .pt-icon-wrap{border-color:var(--mkt);background:var(--white);box-shadow:0 0 0 4px var(--mkt-light);}
.pt-step.pending .pt-icon-wrap{border-color:var(--border);background:var(--bg);}
.pt-step-label{font-size:.72rem;font-weight:700;margin-top:8px;text-align:center;color:var(--muted);transition:color .2s;}
.pt-step.done .pt-step-label,.pt-step.active .pt-step-label{color:var(--ink-2);}
.pt-step-time{font-size:.64rem;color:var(--muted);margin-top:2px;text-align:center;font-family:'DM Mono',monospace;}

/* Map visual placeholder */
.map-visual{background:linear-gradient(135deg,#F0FDF4 0%,#D1FAE5 100%);border-radius:12px;height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1.5px solid #A7F3D0;}
.map-road{position:absolute;background:rgba(5,150,105,.15);height:3px;width:80%;left:10%;border-radius:2px;}
.map-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--mkt);box-shadow:0 0 0 4px var(--mkt-light);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px var(--mkt-light);}50%{box-shadow:0 0 0 8px rgba(5,150,105,.15);}}

/* Order items list */
.tr-item{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--border);}
.tr-item:last-child{border-bottom:none;}
.tr-emoji{width:40px;height:40px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.tr-name{flex:1;font-size:.86rem;font-weight:700;color:var(--ink-2);}
.tr-qty{font-size:.76rem;color:var(--muted);}
.tr-price{font-family:'DM Mono',monospace;font-weight:800;font-size:.84rem;color:var(--ink);}
.tr-status-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;flex-shrink:0;}

/* Activity log */
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.log-title{font-size:.84rem;font-weight:700;color:var(--ink-2);}
.log-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.log-time{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace;min-width:80px;text-align:right;flex-shrink:0;}

/* Rating stars */
.star-row{display:flex;gap:4px;}
.star{font-size:1.4rem;cursor:pointer;transition:transform .1s;opacity:.3;}
.star:hover,.star.on{opacity:1;transform:scale(1.15);}

/* Toast */
.toast-stack{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1F2937;color:#fff;padding:10px 16px;border-radius:9px;font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:toast-in .25s ease both;transition:opacity .3s;}
@keyframes toast-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="app">


<aside class="sidebar"></aside><main class="main">
  <div class="topbar"></div>

  <div class="page-body">
    <div class="page-header">
      <div>
        <div class="page-eyebrow"> Delivery Status</div>
        <div class="page-title">Order Tracking</div>
        <div class="page-sub">Track your active and past orders. All orders delivered to Dhaka High School or your address.</div>
      </div>
      <div class="page-actions">
        <a href="market-catalogue.html" class="btn btn-outline"> Browse More Products</a>
        <a href="market-order.html" class="btn btn-primary" style="background:var(--mkt);border-color:var(--mkt);"> New Order</a>
      </div>
    </div>

    <!-- Order tabs -->
    <div class="order-tabs anim-1" id="orderTabs"></div>

    <!-- Track panel -->
    <div style="display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;" id="trackPanel"></div>
  </div>
</main>
</div>

let activeOrder=0;

function buildTabs(){
  const statusStyles={
    'in-transit':'background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;',
    'delivered':'background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;',
    'pending':'background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;',
  };
  document.getElementById('orderTabs').innerHTML=orders.map((o,i)=>`
    <div class="ot-card ${i===activeOrder?'on':''}" onclick="selectOrder(${i})">
      <div class="ot-id">${o.id}</div>
      <div class="ot-date">${o.date} &middot; ${o.items.length} items</div>
      <div class="ot-status" style="${statusStyles[o.statusKey]||''}">${o.statusLabel}</div>
    </div>`).join('');
}

function selectOrder(i){activeOrder=i;buildTabs();renderTrack();}

function renderTrack(){
  const o=orders[activeOrder];
  const allDone=o.steps.every(s=>s.state==='done');

  document.getElementById('trackPanel').innerHTML=`
    <!-- Left -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Progress stepper -->
      <div class="card anim-1" style="overflow:hidden;">
        <div style="background:${allDone?'linear-gradient(135deg,#064E3B,#059669)':'linear-gradient(135deg,#064E3B,#0891B2)'};padding:16px 20px;color:#fff;display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:.72rem;opacity:.65;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Order ${o.id}</div>
            <div style="font-size:1rem;font-weight:800;">${o.statusLabel}</div>
            <div style="font-size:.78rem;opacity:.75;margin-top:2px;">${allDone?'Delivered':'ETA: '+o.eta}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:1.3rem;font-weight:900;font-family:'DM Mono',monospace;">${o.total.toLocaleString()}</div>
            <div style="font-size:.68rem;opacity:.65;font-weight:600;text-transform:uppercase;letter-spacing:.04em;">Total</div>
          </div>
        </div>
        <div class="progress-track" id="progressTrack">
          ${o.steps.map((s,si)=>`
          <div class="pt-step ${s.state}" ${si<o.steps.length-1?'style="flex:1;"':''}>
            <div class="pt-icon-wrap">${s.state==='done'?'&#x2713;':s.icon}</div>
            <div class="pt-step-label">${s.label}</div>
            <div class="pt-step-time">${s.time}</div>
          </div>
          ${si<o.steps.length-1?'':''}`).join('')}
        </div>
      </div>

      <!-- Courier info (if home delivery) -->
      ${o.trackingNo?`
      <div class="card anim-1" style="padding:14px 18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:2rem;"></div>
        <div style="flex:1;">
          <div style="font-size:.88rem;font-weight:800;color:var(--ink);">${o.courier}</div>
          <div style="font-size:.76rem;color:var(--muted);">Tracking No: <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--mkt);">${o.trackingNo}</span></div>
        </div>
        ${o.courierPhone?`<button class="btn btn-sm btn-outline" style="font-size:.76rem;" onclick="showToast('Calling ${o.courier}&middot;','&#x2705;')"> Call Courier</button>`:''}
      </div>`:
      `<div class="card anim-1" style="padding:14px 18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:2rem;"></div>
        <div><div style="font-size:.88rem;font-weight:800;color:var(--ink);">School Pickup</div><div style="font-size:.76rem;color:var(--muted);">Collect from school reception &middot; Show Order ID</div></div>
      </div>`}

      <div class="card anim-2" style="padding:14px 18px;">
        <div style="font-size:.8rem;font-weight:700;color:var(--ink-2);margin-bottom:10px;"> Delivery Route</div>
        <div class="map-visual">

          <div class="map-road" style="top:35%;transform:rotate(-15deg);"></div>
          <div style="position:absolute;left:12%;top:44%;font-size:1.2rem;"></div>
          <div style="position:absolute;left:12%;top:62%;font-size:.65rem;font-weight:700;color:var(--mkt-dark);">Warehouse</div>
          <div class="map-dot" style="left:58%;top:40%;"></div>
          <div style="position:absolute;left:60%;top:58%;font-size:.65rem;font-weight:700;color:var(--mkt-dark);">Your Package</div>
          <div style="position:absolute;right:10%;top:40%;font-size:1.2rem;"></div>
          <div style="position:absolute;right:8%;top:58%;font-size:.65rem;font-weight:700;color:var(--mkt-dark);">Destination</div>

      </div>`:''}

        <div class="card-header"><div class="card-title">&#x1F4CB; Activity Log</div><div class="card-sub">${o.id}</div></div>

          <div class="log-item">

        <div class="card-header" style="padding:14px 16px 0;"><div class="card-title" style="font-size:.86rem;">Order Items</div><div class="card-sub" style="font-size:.72rem;">${o.items.length} items &middot; &#x09F3; ${o.total.toLocaleString()}</div></div>

              <div class="tr-qty">&middot;${item.qty}</div>
            </div>
            <div class="tr-price">${(item.price*item.qty).toLocaleString()}</div>
            <div class="tr-status-icon" style="background:${o.delivered?'var(--mkt)':'#FEF3C7'};color:${o.delivered?'#fff':'#92400E'};">${o.delivered?'&#x2713;':''}</div>

        </div>
        <div style="padding:12px 18px;border-top:1px solid var(--border);background:var(--bg);">
          <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px;"><span style="color:var(--muted);">Subtotal</span><span style="font-family:'DM Mono',monospace;">${(o.total-o.deliveryCharge).toLocaleString()}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:6px;"><span style="color:var(--muted);">Delivery</span><span style="font-family:'DM Mono',monospace;color:${o.deliveryCharge?'var(--ink)':'var(--mkt)'};">${o.deliveryCharge?'&#x09F3; '+o.deliveryCharge:'Free'}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:.9rem;font-weight:900;border-top:1px solid var(--border);padding-top:6px;"><span>Total Paid</span><span style="font-family:'DM Mono',monospace;color:var(--mkt);">${o.total.toLocaleString()}</span></div>
        </div>
      </div>

      <div class="card anim-2" style="padding:14px 16px;">
        <div style="font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;">Order Details</div>
        <div style="display:flex;flex-direction:column;gap:7px;font-size:.8rem;">
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Payment</span><span style="font-weight:700;">${o.payment}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Method</span><span style="font-weight:700;">${o.method}</span></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Placed</span><span style="font-weight:700;font-family:'DM Mono',monospace;">${o.placed}</span></div>
          ${o.trackingNo?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Tracking</span><span style="font-weight:700;font-family:'DM Mono',monospace;color:var(--mkt);">${o.trackingNo}</span></div>`:''}
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="btn btn-outline btn-sm" style="justify-content:center;font-size:.8rem;" onclick="showToast('Downloading invoice PDF&middot;','&#x2705;')"> Download Invoice</button>
        ${o.delivered?`<button class="btn btn-outline btn-sm" style="justify-content:center;font-size:.8rem;" onclick="showToast('Reorder added to cart','&#x2705;')"> Reorder Same Items</button>`:''}
        <button class="btn btn-outline btn-sm" style="justify-content:center;font-size:.8rem;border-color:var(--red);color:var(--red);" onclick="showToast('Support request submitted','&#x2705;')">Report an Issue</button>
      </div>
    </div>`;
}

function rateOrder(id,rating){
  const o=orders.find(x=>x.id===id);
  if(o)o.rating=rating;
  renderTrack();
  showToast(`Thank you for rating! ${rating} star${rating>1?'s':''}`,'&#x2705;');
}

function searchOrder(q){
  if(!q)return;
  const idx=orders.findIndex(o=>o.id.toLowerCase().includes(q.toLowerCase()));
  if(idx>=0){selectOrder(idx);showToast(`Found: ${orders[idx].id}`,'&#x2705;');}
  else showToast('Order not found','&#x2705;');
}

function showToast(msg,icon='&#x2139;&#xFE0F;'){
  const s=document.getElementById('toastStack');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span>${icon}</span>${msg}`;
  s.appendChild(t);setTimeout(()=>t.style.opacity='0',2400);setTimeout(()=>t.remove(),2700);
}

buildTabs();renderTrack();
</script>
